<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Gatos</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="img/logo.png">
</head>

<body>

<header>
    <nav>
        <div class="logo">🐱 Cats</div>
        <ul class="nav-links">
            <li><a href="#hero">Inicio</a></li>
            <li><a href="#gatos">Gatos</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section id="hero">
    <h1>La mejor galería de gatos</h1>
    <p>Simple. Elegante. Perfecto.</p>
    <button class="cta-button">Explorar</button>
</section>

<!-- GATOS -->
<section id="gatos">
    <h2>Destacados</h2>

    <div class="gatos-grid">

        <div class="gatos-card hidden">
            <img src="img/Road Cat.jpg">
            <h3>Gato Backroom</h3>
            <p>Misterioso y único.</p>
        </div>

        <div class="gatos-card hidden">
            <img src="img/Gato flor.jpg">
            <h3>Gato Flor</h3>
            <p>Elegancia natural.</p>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
